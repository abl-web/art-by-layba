backend:
  name: github
  repo: abl-web/art-by-layba
  branch: main
media_folder: "public/uploads"
public_folder: "/uploads"
collections:
  - name: content
    label: Website content
    files:
      - name: settings
        label: Homepage and contact
        file: src/content/site.json
        fields:
          - {label: Artist name, name: artistName, widget: string}
          - {label: Homepage heading, name: heroText, widget: text}
          - {label: About, name: about, widget: text}
          - {label: Email, name: email, widget: string}
          - {label: Instagram URL, name: instagram, widget: string, required: false}
      - name: gallery
        label: Artwork gallery
        file: src/content/artworks.json
        fields:
          - label: Artworks
            name: items
            widget: list
            fields:
              - {label: Image, name: image, widget: image}
              - {label: Image alt text, name: alt, widget: string, required: false}
              - {label: Title, name: title, widget: string}
              - {label: Medium, name: medium, widget: string, required: false}
              - {label: Dimensions, name: dimensions, widget: string, required: false}
              - {label: Year, name: year, widget: string, required: false}
              - {label: Price, name: price, widget: string, required: false}
              - {label: Description, name: description, widget: text, required: false}
              - label: Status
                name: status
                widget: select
                options:
                  - {label: Available, value: available}
                  - {label: Sold, value: sold}
                  - {label: Private / Not for sale, value: private}
                default: available
