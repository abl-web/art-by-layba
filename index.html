<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layba Amjad — Fine Artist | Original Paintings & Custom Commissions</title>
    <meta name="description" content="Fine art by Layba Amjad, BFA graduate of LCWU Lahore. Original paintings, portraits, and custom commissions. Shop available works or commission a bespoke piece." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=Italiana&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hidden form for Netlify Forms crawler detection -->
    <form name="commission-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="city" />
      <input type="text" name="artType" />
      <input type="text" name="size" />
      <input type="text" name="medium" />
      <input type="text" name="timeline" />
      <input type="text" name="budget" />
      <textarea name="description"></textarea>
      <textarea name="notes"></textarea>
      <input type="text" name="estimate" />
    </form>
  </body>
</html>
